services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    networks:
      - rede-cluster
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  no-mestre:
    build: ./mestre
    container_name: no-mestre
    ports:
      - "5000:5000"
    networks:
      - rede-cluster
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - SLICES=10
      - TIMEOUT_RESULTADO=30
    volumes:
      - ./logs_visuais:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
      no-1:
        condition: service_healthy
      no-2:
        condition: service_healthy
      no-3:
        condition: service_healthy
      no-4:
        condition: service_healthy
      no-5:
        condition: service_healthy

  no-1:
    build: ./worker
    container_name: no-1
    networks:
      - rede-cluster
    environment:
      - NOME_NO=Nó 1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs_visuais:/app/logs
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

